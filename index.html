<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DearBUP - Feel. Write. Share.</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="js/script.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <!-- Sidebar -->
<div class="sidebar fixed top-0 left-0 h-screen w-[280px] bg-ash gray/95 backdrop-blur-xl border-r border-black/10 flex flex-col z-50 shadow-lg">

    <!-- Top -->
    <div class="p-8 pb-0">
        <div class="flex items-center gap-3 text-[#d65d64] text-2xl font-extrabold tracking-tight mb-10">
            <img src="images/Logo.svg" class="w-[50px] h-[50px]" />
            <span>DearBUP</span>
        </div>
    </div>

    <!-- Nav -->
    <nav class="flex-1 px-6 space-y-2">

        <a href="#" class="flex items-center gap-5 px-4 py-3 rounded-xl text-gray-500 font-medium hover:text-[#d65d64] hover:bg-[#e0c0ac]/20 transition nav-item active">
            <i class="fas fa-home w-6 text-lg"></i>
            <span>Home</span>
        </a>

        <a href="#" class="flex items-center gap-5 px-4 py-3 rounded-xl text-gray-500 font-medium hover:text-[#d65d64] hover:bg-[#e0c0ac]/20 transition nav-item">
            <i class="fas fa-bell w-6 text-lg"></i>
            <span>Notifications</span>
        </a>

        <a href="#" class="flex items-center gap-5 px-4 py-3 rounded-xl text-gray-500 font-medium hover:text-[#d65d64] hover:bg-[#e0c0ac]/20 transition nav-item">
            <i class="fas fa-user w-6 text-lg"></i>
            <span>Profile</span>
        </a>

        <a href="#" class="flex items-center gap-5 px-4 py-3 rounded-xl text-gray-500 font-medium hover:text-[#d65d64] hover:bg-[#e0c0ac]/20 transition nav-item">
            <i class="fas fa-users w-6 text-lg"></i>
            <span>Organizations</span>
        </a>
    </nav>

    <!-- Bottom Button -->
    <div class="p-6">
        <a href="#" id="writePostBtn"
           class="flex items-center justify-center gap-3 w-full py-4 rounded-2xl text-white font-semibold bg-gradient-to-r from-[#e06a72] to-[#d65d64] shadow-lg hover:shadow-xl hover:-translate-y-1 transition">
            <i class="fas fa-feather-alt"></i>
            Write
        </a>
    </div>
</div>
        <button id="menuToggle" class="menu-toggle">
            <i class="fas fa-bars"></i>
        </button>
    <!-- Main Content -->
    <div class="main-content">


        <!-- Center Feed (unchanged) -->
        <div class="center-feed">
            <!-- Create Post Modal (unchanged) -->
            <div class="modal" id="createPostModal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>What's on your mind?</h3>
                        <button class="close-modal" id="closeModal">&times;</button>
                    </div>
                    <form id="postForm" class="post-form">
                        <textarea 
                            id="postContent" 
                            placeholder="Feel. Write. Share your BUP story..."
                            maxlength="280"
                        ></textarea>
                        <div class="post-actions">
                            <div class="action-buttons">
                                <button type="button" class="action-btn">
                                    <i class="fas fa-music"></i>
                                </button>
                                <button type="button" class="action-btn">
                                    <i class="fas fa-image"></i>
                                </button>
                                <button type="button" class="action-btn">
                                    <i class="fas fa-link"></i>
                                </button>
                            </div>
                            <div class="char-counter">
                                <span id="charCount">0</span>/280
                            </div>
                            <button type="submit" class="post-submit" disabled>
                                Post
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Welcome Section (unchanged) -->
            <div class="welcome-section">
                <button class="cta-button" id="startWriting">Start Writing</button>
            </div>

            <!-- Posts Feed (unchanged) -->
            <div class="posts-feed" id="postsFeed">
                <!-- Posts will be loaded here via JS -->
            </div>
        </div>

        <!-- RIGHT PANEL REMOVED -->
    </div>
</body>
</html>
