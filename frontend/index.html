<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DearBUP - Feel. Write. Share.</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar fixed top-0 left-0 h-screen w-[280px] bg-ash gray/95 backdrop-blur-xl border-r border-black/10 flex flex-col z-50 shadow-lg">
        <div class="p-8 pb-0">
            <div class="flex items-center gap-3 text-[#d65d64] text-2xl font-extrabold tracking-tight mb-10">
                <img src="images/Logo.svg" class="w-[50px] h-[50px]" />
                <span>DearBUP</span>
            </div>
        </div>
        <nav class="flex-1 px-6 space-y-2">
            <a href="#" class="flex items-center gap-5 px-4 py-3 rounded-xl text-gray-500 font-medium hover:text-[#d65d64] hover:bg-[#e0c0ac]/20 transition nav-item active">
                <i class="fas fa-home w-6 text-lg"></i>
                <span>Home</span>
            </a>
            <a href="#" class="flex items-center gap-5 px-4 py-3 rounded-xl text-gray-500 font-medium hover:text-[#d65d64] hover:bg-[#e0c0ac]/20 transition nav-item">
                <i class="fas fa-bell w-6 text-lg"></i>
                <span>Notifications</span>
            </a>
            <a href="#" class="flex items-center gap-5 px-4 py-3 rounded-xl text-gray-500 font-medium hover:text-[#d65d64] hover:bg-[#e0c0ac]/20 transition nav-item">
                <i class="fas fa-user w-6 text-lg"></i>
                <span>Profile</span>
            </a>
            <a href="#" class="flex items-center gap-5 px-4 py-3 rounded-xl text-gray-500 font-medium hover:text-[#d65d64] hover:bg-[#e0c0ac]/20 transition nav-item">
                <i class="fas fa-users w-6 text-lg"></i>
                <span>Organizations</span>
            </a>
        </nav>
        <div class="p-6">
            <a href="#" id="writePostBtn"
               class="flex items-center justify-center gap-3 w-full py-4 rounded-2xl text-white font-semibold bg-gradient-to-r from-[#e06a72] to-[#d65d64] shadow-lg hover:shadow-xl hover:-translate-y-1 transition">
                <i class="fas fa-feather-alt"></i>
                Write
            </a>
        </div>
    </div>

    <button id="menuToggle" class="menu-toggle">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Main Content -->
    <div class="main-content">
        <div class="center-feed">

            <!-- Create Post Modal -->
            <div class="modal" id="createPostModal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>What's on your mind?</h3>
                        <button class="close-modal" id="closeModal">&times;</button>
                    </div>
                    <form id="postForm" class="post-form">
                        <textarea id="postContent" placeholder="Feel. Write. Share your BUP story..." maxlength="280"></textarea>
                        <div class="post-actions">
                            <div class="action-buttons">
                                <button type="button" class="action-btn"><i class="fas fa-music"></i></button>
                                <button type="button" class="action-btn"><i class="fas fa-image"></i></button>
                                <button type="button" class="action-btn"><i class="fas fa-link"></i></button>
                            </div>
                            <div class="char-counter"><span id="charCount">0</span>/280</div>
                            <button type="submit" class="post-submit" disabled>Post</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Letter Compose Modal -->
            <div class="letter-compose-modal" id="letterComposeModal">
                <div class="letter-compose-content">
                    <div class="letter-compose-header">
                        <div class="letter-compose-title">
                            <i class="fas fa-feather-alt"></i>
                            <h3>Write a Letter</h3>
                        </div>
                        <button class="close-modal" id="closeLetterModal">&times;</button>
                    </div>
                    <div class="letter-compose-body">
                        <textarea id="letterContent" placeholder="Dear BUP family… share what's on your heart." maxlength="500"></textarea>
                        <div class="letter-char-counter"><span id="letterCharCount">0</span>/500</div>

                        <!-- Spotify Search -->
                        <div class="spotify-section">
                            <div class="spotify-search-bar">
                                <i class="fab fa-spotify spotify-icon"></i>
                                <input type="text" id="spotifySearchInput" placeholder="Search a song for your letter…" autocomplete="off" />
                                <button type="button" id="spotifySearchBtn" class="spotify-search-btn">
                                    <i class="fas fa-search"></i>
                                </button>
                            </div>

                            <!-- Search Results -->
                            <div class="spotify-results" id="spotifyResults" style="display:none;">
                                <div class="spotify-results-list" id="spotifyResultsList"></div>
                            </div>

                            <!-- Selected Track -->
                            <div class="spotify-selected" id="spotifySelected" style="display:none;">
                                <img id="selectedTrackArt" src="" alt="" />
                                <div class="selected-track-info">
                                    <div class="selected-track-name" id="selectedTrackName"></div>
                                    <div class="selected-track-artist" id="selectedTrackArtist"></div>
                                </div>
                                <a id="selectedTrackLink" href="" target="_blank" class="spotify-open-btn">
                                    <i class="fab fa-spotify"></i> Open
                                </a>
                                <button type="button" id="clearTrackBtn" class="clear-track-btn"><i class="fas fa-times"></i></button>
                            </div>
                        </div>

                        <div class="letter-compose-footer">
                            <button class="letter-submit-btn" id="submitLetterBtn">
                                <i class="fas fa-paper-plane"></i> Post Letter
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Letters Section -->
            <div class="letters-section" id="lettersSection">
                <div class="letters-container" id="lettersContainer"></div>
            </div>

            <!-- Welcome Section -->
            <div class="welcome-section">
                <button class="cta-button" id="startWriting">Start Writing</button>
            </div>

            <!-- Posts Feed -->
            <div class="posts-feed" id="postsFeed"></div>
        </div>
    </div>

    <!-- Horizontal Story Overlay -->
    <div class="letter-story-overlay" id="letterStoryOverlay">
        <button class="story-nav story-prev" id="storyPrev"><i class="fas fa-chevron-left"></i></button>
        <button class="story-nav story-next" id="storyNext"><i class="fas fa-chevron-right"></i></button>

        <div class="story-container-horiz">
            <!-- Progress bar -->
            <div class="story-progress-bar">
                <div class="story-progress-fill" id="storyProgressFill"></div>
            </div>

            <!-- Left: Author + Text -->
            <div class="story-left-panel">
                <div class="story-header-horiz">
                    <div class="story-avatar" id="storyAvatar"></div>
                    <div>
                        <div class="story-author" id="storyAuthor"></div>
                        <div class="story-label">Letter</div>
                    </div>
                    <button class="story-close" id="storyClose"><i class="fas fa-times"></i></button>
                </div>

                <div class="story-body">
                    <div class="story-quote-mark">"</div>
                    <div class="story-text" id="storyText"></div>
                </div>

                <!-- Dot indicators -->
                <div class="story-dots" id="storyDots"></div>
            </div>

            <!-- Right: Spotify Player -->
            <div class="story-right-panel" id="storyRightPanel">
                <div class="story-music-panel" id="storyMusicPanel" style="display:none;">
                    <div class="story-album-art-wrapper">
                        <img class="story-album-art" id="storyAlbumArt" src="" alt="" />
                        <div class="story-album-spin-ring"></div>
                    </div>
                    <div class="story-track-info">
                        <div class="story-track-name" id="storyTrackName"></div>
                        <div class="story-track-artist" id="storyTrackArtist"></div>
                    </div>
                    <a class="story-spotify-btn" id="storySpotifyBtn" href="" target="_blank">
                        <i class="fab fa-spotify"></i> Listen on Spotify
                    </a>
                    <div class="story-waveform">
                        <span></span><span></span><span></span><span></span><span></span>
                        <span></span><span></span><span></span><span></span><span></span>
                    </div>
                </div>
                <div class="story-no-music" id="storyNoMusic" style="display:none;">
                    <i class="fas fa-music"></i>
                    <span>No song attached</span>
                </div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
