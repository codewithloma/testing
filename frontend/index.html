<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DearBUP - Feel. Write. Share.</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="js/script.js"></script>
</head>
<body>
    <!-- Sidebar (unchanged) -->
    <div class="sidebar">
        <div class="sidebar-top">
            <div class="logo">
                 <a href=""><img src="images/Logo.svg" alt="" class="logo-img" ></a>
                <span>DearBUP</span>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="#" class="nav-item active" data-page="home">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </a>

            <a href="#" class="nav-item" data-page="notifications">
                <i class="fas fa-bell"></i>
                <span>Notifications</span>
            </a>

            </a>
            <a href="#" class="nav-item" data-page="profile">
                <i class="fas fa-user"></i>
                <span>Profile</span>
            </a>
            <a href="#" class="nav-item" data-page="organizations">
                <i class="fas fa-users"></i>
                <span>Organizations</span>
            </a>
        </nav>
        <div class="sidebar-bottom">
            <a href="#" class="nav-item write-post" id="writePostBtn">
                <i class="fas fa-feather-alt"></i>
                <span>Write</span>
            </a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">


        <!-- Center Feed (unchanged) -->
        <div class="center-feed">
            <!-- Create Post Modal (unchanged) -->
            <div class="modal" id="createPostModal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>What's on your mind?</h3>
                        <button class="close-modal" id="closeModal">&times;</button>
                    </div>
                    <form id="postForm" class="post-form">
                        <textarea 
                            id="postContent" 
                            placeholder="Feel. Write. Share your BUP story..."
                            maxlength="280"
                        ></textarea>
                        <div class="post-actions">
                            <div class="action-buttons">
                                <button type="button" class="action-btn">
                                    <i class="fas fa-music"></i>
                                </button>
                                <button type="button" class="action-btn">
                                    <i class="fas fa-image"></i>
                                </button>
                                <button type="button" class="action-btn">
                                    <i class="fas fa-link"></i>
                                </button>
                            </div>
                            <div class="char-counter">
                                <span id="charCount">0</span>/280
                            </div>
                            <button type="submit" class="post-submit" disabled>
                                Post
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Welcome Section (unchanged) -->
            <div class="welcome-section">
                <h1>Welcome to DearBUP</h1>
                <p>Feel. Write. Share. your Bicol University-Polangui story</p>
                <button class="cta-button" id="startWriting">Start Writing</button>
            </div>

            <!-- Posts Feed (unchanged) -->
            <div class="posts-feed" id="postsFeed">
                <!-- Posts will be loaded here via JS -->
            </div>
        </div>

        <!-- RIGHT PANEL REMOVED -->
    </div>
</body>
</html>
